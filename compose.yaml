services:
  onnx-smoke:
    image: rocm-legacy/onnx-smoke:${PROFILE_NAME}
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: onnx-smoke
      args:
        ROCM_VERSION: ${ROCM_VERSION}
        ORT_TAG: ${ORT_TAG}
        AMDGPU_DEB_URL: ${AMDGPU_DEB_URL}
        HIP_ARCH: ${HIP_ARCH}
    environment:
      PROFILE_NAME: ${PROFILE_NAME}
      HSA_OVERRIDE_GFX_VERSION: ${HSA_OVERRIDE_GFX_VERSION}
      ROC_ENABLE_PRE_VEGA: ${ROC_ENABLE_PRE_VEGA:-0}
      MODEL_PATH: /models/model.onnx
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - ${VIDEO_GID:-44}
      - ${RENDER_GID:-109}
    volumes:
      - ./models:/models

  frigate:
    image: rocm-legacy/frigate:${PROFILE_NAME}
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: frigate
      args:
        ROCM_VERSION: ${ROCM_VERSION}
        ORT_TAG: ${ORT_TAG}
        AMDGPU_DEB_URL: ${AMDGPU_DEB_URL}
        HIP_ARCH: ${HIP_ARCH}
        FRIGATE_IMAGE: ${FRIGATE_IMAGE:-ghcr.io/blakeblackshear/frigate:0.17.1}
    environment:
      PROFILE_NAME: ${PROFILE_NAME}
      HSA_OVERRIDE_GFX_VERSION: ${HSA_OVERRIDE_GFX_VERSION}
      ROC_ENABLE_PRE_VEGA: ${ROC_ENABLE_PRE_VEGA:-0}
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - ${VIDEO_GID:-44}
      - ${RENDER_GID:-109}
    volumes:
      - ./config:/config
      - ./models:/models
